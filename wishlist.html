<!doctype html>

<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Wishlist | LUMINOUS NOIR</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
            rel="stylesheet"
        />
        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "on-error-container": "#ffdad6",
                            "secondary-container": "#314863",
                            "surface-container": "#1f1f1f",
                            "on-secondary-fixed": "#011d35",
                            "secondary-fixed-dim": "#b0c9e8",
                            "surface-container-low": "#1b1b1b",
                            "on-primary-fixed-variant": "#004f58",
                            outline: "#849396",
                            "surface-container-highest": "#353535",
                            "outline-variant": "#3b494c",
                            "on-tertiary-fixed-variant": "#004b70",
                            "inverse-on-surface": "#303030",
                            "on-secondary": "#19324b",
                            "on-primary-fixed": "#001f24",
                            "surface-tint": "#00daf3",
                            "on-secondary-container": "#9fb7d6",
                            "tertiary-container": "#a4d6ff",
                            "surface-bright": "#393939",
                            "error-container": "#93000a",
                            "tertiary-fixed-dim": "#8dcdff",
                            "surface-container-high": "#2a2a2a",
                            "on-secondary-fixed-variant": "#314863",
                            "surface-dim": "#131313",
                            "on-primary": "#00363d",
                            tertiary: "#deefff",
                            "primary-fixed-dim": "#00daf3",
                            background: "#131313",
                            "on-background": "#e2e2e2",
                            "surface-container-lowest": "#0e0e0e",
                            error: "#ffb4ab",
                            "on-primary-container": "#00626e",
                            "on-tertiary-container": "#005e8b",
                            primary: "#c3f5ff",
                            "secondary-fixed": "#d1e4ff",
                            secondary: "#b0c9e8",
                            "inverse-primary": "#006875",
                            "surface-variant": "#353535",
                            "on-tertiary-fixed": "#001e30",
                            "primary-container": "#00e5ff",
                            surface: "#131313",
                            "on-surface": "#e2e2e2",
                            "inverse-surface": "#e2e2e2",
                            "on-error": "#690005",
                            "tertiary-fixed": "#cae6ff",
                            "on-surface-variant": "#bac9cc",
                            "on-tertiary": "#00344f",
                            "primary-fixed": "#9cf0ff",
                        },
                        fontFamily: {
                            headline: ["Space Grotesk"],
                            body: ["Manrope"],
                            label: ["Manrope"],
                        },
                        borderRadius: {
                            DEFAULT: "0.125rem",
                            lg: "0.25rem",
                            xl: "0.5rem",
                            full: "0.75rem",
                        },
                    },
                },
            };
        </script>
        <style>
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
            .neon-hover:hover {
                box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
                border-top: 1px solid rgba(0, 229, 255, 0.4);
            }
            .glass-effect {
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
            }
        </style>
    </head>
    <body
        class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary"
    >
        <!-- TopNavBar -->
        <nav
            class="fixed top-0 w-full z-50 bg-[#131313]/80 backdrop-blur-xl border-b border-cyan-500/10 shadow-[0_4px_20px_rgba(0,0,0,0.5)] flex justify-between items-center px-8 h-16 w-full"
        >
            <div
                class="text-2xl font-bold tracking-tighter text-cyan-400 drop-shadow-[0_0_8px_rgba(0,229,255,0.5)] font-headline"
            >
                LUMINOUS NOIR
            </div>
            <div
                class="hidden md:flex items-center gap-8 font-headline tracking-tight text-sm uppercase"
            >
                <a
                    class="text-gray-400 hover:text-gray-200 transition-colors duration-300 ease-in-out hover:text-cyan-300 hover:drop-shadow-[0_0_5px_rgba(0,229,255,0.8)]"
                    href="./shop.html"
                    >Shop</a
                >
                <a
                    class="text-cyan-400 border-b-2 border-cyan-400 pb-1 duration-300 ease-in-out hover:text-cyan-300 hover:drop-shadow-[0_0_5px_rgba(0,229,255,0.8)]"
                    href="./index.html"
                    >Wishlist</a
                >
                <a
                    class="text-gray-400 hover:text-gray-200 transition-colors duration-300 ease-in-out hover:text-cyan-300 hover:drop-shadow-[0_0_5px_rgba(0,229,255,0.8)]"
                    href="./order.html"
                    >Orders</a
                >
            </div>
            <div class="flex items-center gap-6">
                <button
                    class="text-gray-400 hover:text-cyan-400 transition-colors duration-300"
                >
                    <span
                        class="material-symbols-outlined"
                        data-icon="shopping_cart"
                        >shopping_cart</span
                    >
                </button>
                <button
                    class="text-gray-400 hover:text-cyan-400 transition-colors duration-300"
                >
                    <span
                        class="material-symbols-outlined"
                        data-icon="account_circle"
                        >account_circle</span
                    >
                </button>
            </div>
        </nav>
        <main class="pt-28 pb-20 px-6 md:px-12 max-w-7xl mx-auto">
            <!-- Header Section -->
            <header class="mb-12">
                <div class="flex flex-col gap-2">
                    <span
                        class="text-primary-fixed-dim font-headline text-xs tracking-[0.2em] uppercase"
                        >Curated Collection</span
                    >
                    <h1
                        class="text-4xl md:text-5xl font-headline font-bold text-on-surface tracking-tight"
                    >
                        Your Wishlist
                    </h1>
                    <p
                        class="text-on-surface-variant max-w-lg mt-4 font-light leading-relaxed"
                    >
                        Artifacts reserved for your digital gallery. Review and
                        transition your selections to ownership.
                    </p>
                </div>
            </header>
            <div
                id="wishlist-container"
                class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
            ></div>

            <!-- Pagination/Footer Actions -->
            <footer
                class="mt-20 pt-10 border-t border-outline-variant/10 flex flex-col md:flex-row justify-between items-center gap-6"
            >
                <div class="flex items-center gap-4">
                    <button
                        class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors text-sm font-headline uppercase tracking-widest"
                    >
                        <span
                            class="material-symbols-outlined text-lg"
                            data-icon="share"
                            >share</span
                        >
                        Share Wishlist
                    </button>
                </div>
                <div class="flex gap-2">
                    <button
                        class="px-6 py-2 rounded-full border border-outline-variant/20 text-on-surface-variant hover:text-on-surface hover:bg-surface-container transition-all text-xs font-bold uppercase tracking-widest"
                    >
                        Clear List
                    </button>
                    <button
                        class="px-8 py-2 rounded-full bg-on-surface text-background hover:bg-primary transition-all text-xs font-bold uppercase tracking-widest"
                    >
                        Move All to Cart
                    </button>
                </div>
            </footer>
        </main>
        <!-- Floating Action Element (Hidden on detail, shown on main flows) -->
        <div class="fixed bottom-8 right-8 z-40">
            <button
                class="w-14 h-14 bg-primary-container text-on-primary rounded-full shadow-2xl flex items-center justify-center transition-all duration-300 hover:scale-110 active:scale-90 hover:shadow-[0_0_20px_#00e5ff]"
            >
                <span class="material-symbols-outlined" data-icon="chat_bubble"
                    >chat_bubble</span
                >
            </button>
        </div>
    </body>
    <script src="js/wishlist.js"></script>
</html>
