<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register</title>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <!-- 1. Đổi bg-gray-100 thành dải màu xanh đậm (blue-950 to slate-950) -->
        <div
            class="min-h-screen bg-linear-to-br from-blue-950 to-slate-950 flex items-center justify-center p-4"
        >
            <!-- 2. Tăng độ đổ bóng với shadow-2xl để form nổi bật -->
            <div class="max-w-md w-full bg-white rounded-xl shadow-2xl p-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">
                    Register
                </h2>

                <form class="space-y-4" id="register-form">
                    <div>
                        <label
                            class="block text-sm font-medium text-gray-700 mb-1"
                            >Full name</label
                        >
                        <input
                            type="text"
                            name="fullName"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                            placeholder="Nguyen Van A"
                        />
                    </div>
                    <div>
                        <label
                            class="block text-sm font-medium text-gray-700 mb-1"
                            >Email</label
                        >
                        <input
                            type="email"
                            name="email"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                            placeholder="your@email.com"
                        />
                    </div>

                    <div>
                        <label
                            class="block text-sm font-medium text-gray-700 mb-1"
                            >Password</label
                        >
                        <input
                            type="password"
                            name="password"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                            placeholder="••••••••"
                        />
                    </div>
                    <div>
                        <label
                            class="block text-sm font-medium text-gray-700 mb-1"
                            >Repeat Password</label
                        >
                        <input
                            type="password"
                            name="repeatPassword"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                            placeholder="••••••••"
                        />
                    </div>

                    <!-- 3. Đổi màu nút bấm từ indigo sang blue -->
                    <button
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-lg"
                    >
                        Register now
                    </button>
                </form>

                <div class="mt-6 text-center text-sm text-gray-600">
                    Have an account?
                    <a
                        href="./login.html"
                        class="text-blue-600 hover:text-blue-500 font-medium"
                        >Login now</a
                    >
                </div>
            </div>
        </div>
        <script src="./js/register.js"></script>
    </body>
</html>
