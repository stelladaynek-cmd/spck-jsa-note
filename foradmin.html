<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Luminous Admin | Command Center</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                background: #050505;
                color: #fff;
                font-family: "Space Grotesk", sans-serif;
            }
            .cyber-input {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.1);
                transition: all 0.3s;
            }
            .cyber-input:focus {
                border-color: #00f2ff;
                box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
                outline: none;
            }
            .glass-card {
                background: rgba(15, 15, 15, 0.8);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
        </style>
    </head>
    <body class="p-6 md:p-12">
        <div class="max-w-7xl mx-auto">
            <header
                class="flex justify-between items-center mb-12 border-b border-white/10 pb-6"
            >
                <h1 class="text-3xl font-black italic">
                    COMMAND <span class="text-cyan-400">CENTER</span>
                </h1>
                <a
                    href="index.html"
                    class="text-xs font-bold border border-white/20 px-6 py-2 rounded-full hover:bg-white hover:text-black transition-all"
                    >XEM CỬA HÀNG</a
                >
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-5">
                    <div class="glass-card p-8 rounded-[2rem] sticky top-8">
                        <h2
                            class="text-cyan-400 text-xs font-bold uppercase tracking-[0.2em] mb-8"
                        >
                            Thêm sản phẩm mới
                        </h2>
                        <div class="space-y-5">
                            <input
                                type="text"
                                id="name"
                                class="cyber-input w-full rounded-2xl px-5 py-4 text-sm"
                                placeholder="Tên sản phẩm"
                            />
                            <input
                                type="text"
                                id="price"
                                class="cyber-input w-full rounded-2xl px-5 py-4 text-sm"
                                placeholder="Giá (VD: $2,500)"
                            />
                            <input
                                type="text"
                                id="image"
                                class="cyber-input w-full rounded-2xl px-5 py-4 text-sm"
                                placeholder="Link ảnh (URL)"
                            />
                            <textarea
                                id="desc"
                                rows="4"
                                class="cyber-input w-full rounded-2xl px-5 py-4 text-sm"
                                placeholder="Mô tả chi tiết"
                            ></textarea>
                            <button
                                id="addBtn"
                                class="w-full bg-cyan-400 text-black font-black py-5 rounded-2xl hover:bg-white transition-all shadow-[0_0_20px_rgba(0,242,255,0.3)] uppercase text-xs"
                            >
                                Lưu vào kho hàng
                            </button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-7">
                    <div class="glass-card p-8 rounded-[2rem]">
                        <h2
                            class="text-gray-500 text-xs font-bold uppercase mb-8"
                        >
                            Danh sách trong kho
                        </h2>
                        <div
                            id="admin-list"
                            class="space-y-4 max-h-[600px] overflow-y-auto pr-2"
                        ></div>
                    </div>
                </div>
            </div>
        </div>
        <script src="js/admin.js"></script>
    </body>
</html>
