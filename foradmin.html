<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>LUMINOUS NOIR | Admin Panel</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-[#0a0a0a] text-white p-10">
        <div
            class="max-w-md mx-auto bg-[#111] p-8 rounded-2xl border border-white/10 shadow-2xl"
        >
            <h2 class="text-2xl font-bold mb-6 uppercase text-cyan-400">
                Thêm Sản Phẩm Mới
            </h2>

            <div class="space-y-4">
                <input
                    type="text"
                    id="add-name"
                    placeholder="Tên sản phẩm"
                    class="w-full bg-black border border-white/10 p-3 rounded-lg outline-none focus:border-cyan-400"
                />
                <input
                    type="text"
                    id="add-price"
                    placeholder="Giá (Ví dụ: $2,500)"
                    class="w-full bg-black border border-white/10 p-3 rounded-lg outline-none focus:border-cyan-400"
                />
                <input
                    type="text"
                    id="add-image"
                    placeholder="Link hình ảnh (URL)"
                    class="w-full bg-black border border-white/10 p-3 rounded-lg outline-none focus:border-cyan-400"
                />
                <textarea
                    id="add-desc"
                    placeholder="Mô tả sản phẩm"
                    rows="4"
                    class="w-full bg-black border border-white/10 p-3 rounded-lg outline-none focus:border-cyan-400"
                ></textarea>

                <button
                    id="btn-save-product"
                    class="w-full bg-cyan-400 text-black py-4 rounded-lg font-bold uppercase hover:bg-white transition-all"
                >
                    Lưu vào hệ thống
                </button>
                <a
                    href="index.html"
                    class="block text-center text-gray-500 text-xs mt-4 underline"
                    >Quay lại trang chủ</a
                >
            </div>
        </div>
        <script src="admin.js"></script>
    </body>
</html>
