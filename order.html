<!doctype html>
<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>LUMINOUS NOIR | Order Tracking</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body class="bg-[#0a0a0a] text-white font-['Manrope']">
        <main class="max-w-7xl mx-auto px-8 py-20">
            <div class="mb-12">
                <p
                    class="text-primary text-xs font-bold uppercase tracking-[0.3em] mb-2"
                >
                    Purchase Successful
                </p>
                <h1
                    id="order-id-title"
                    class="text-4xl md:text-6xl font-bold tracking-tighter"
                >
                    Order #-------
                </h1>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <div class="lg:col-span-8">
                    <section
                        class="bg-[#111] rounded-3xl p-8 border border-white/5"
                    >
                        <h2
                            class="text-lg font-bold mb-6 uppercase tracking-widest"
                        >
                            Order Items
                        </h2>

                        <div id="order-items-list" class="space-y-6">
                            <p class="text-gray-500">
                                Đang tải thông tin đơn hàng...
                            </p>
                        </div>
                    </section>
                </div>

                <div class="lg:col-span-4 space-y-6">
                    <div
                        class="bg-primary/5 border border-primary/10 p-6 rounded-2xl"
                    >
                        <h3
                            class="text-sm font-bold text-primary uppercase mb-4"
                        >
                            Shipping Status
                        </h3>
                        <p class="text-sm">
                            Đơn hàng đang được chuẩn bị và sẽ sớm gửi đến bạn.
                        </p>
                    </div>
                </div>
            </div>
        </main>

        <script src="order.js"></script>
    </body>
</html>
