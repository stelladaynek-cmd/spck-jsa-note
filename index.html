<!doctype html>
<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
            rel="stylesheet"
        />

        <script id="tailwind-config">
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            "on-primary": "#00363d",
                            "inverse-on-surface": "#303030",
                            "surface-tint": "#00daf3",
                            "surface-variant": "#353535",
                            "outline-variant": "#3b494c",
                            surface: "#131313",
                            primary: "#c3f5ff",
                            "primary-container": "#00e5ff",
                            "primary-fixed-dim": "#00daf3",
                            "on-surface": "#e2e2e2",
                            secondary: "#b0c9e8",
                            "secondary-container": "#314863",
                        },
                        fontFamily: {
                            headline: ["Space Grotesk"],
                            body: ["Manrope"],
                            label: ["Manrope"],
                        },
                    },
                },
            };
        </script>
        <style>
            body {
                background-color: #131313;
                color: #e2e2e2;
                font-family: "Manrope", sans-serif;
            }
            .grid-pattern {
                background-image:
                    linear-gradient(#3b494c1a 1px, transparent 1px),
                    linear-gradient(90deg, #3b494c1a 1px, transparent 1px);
                background-size: 40px 40px;
            }
            .neon-glow-hover:hover {
                box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
                border-top: 1px solid rgba(0, 229, 255, 0.3);
            }
            .product-card {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .product-card:hover {
                transform: translateY(-8px);
            }
        </style>
    </head>

    <body
        class="bg-surface selection:bg-primary-container selection:text-on-primary"
    >
        <!-- TopNavBar -->
        <nav
            class="fixed top-0 w-full z-50 bg-[#131313]/80 backdrop-blur-xl border-b border-[#3b494c]/15"
        >
            <div
                class="flex justify-between items-center px-8 h-20 w-full max-w-screen-2xl mx-auto"
            >
                <div
                    class="text-2xl font-bold tracking-tighter text-[#e2e2e2] uppercase font-['Space_Grotesk']"
                >
                    Note
                </div>
                <div
                    class="hidden md:flex items-center space-x-8 font-['Space_Grotesk'] tracking-tight"
                >
                    <a
                        class="text-[#00e5ff] border-b-2 border-[#00e5ff] pb-1"
                        href="./shop.html"
                        >shop</a
                    >
                    <a
                        class="text-[#b0c9e8] hover:text-[#e2e2e2] transition-colors"
                        href="./order.html"
                        >orders</a
                    >
                    <a
                        class="text-[#b0c9e8] hover:text-[#e2e2e2] transition-colors"
                        href="./wishlist.html"
                        >wish list</a
                    >
                    <a
                        class="text-[#b0c9e8] hover:text-[#e2e2e2] transition-colors"
                        href="./foradmin.html"
                        >for admin</a
                    >
                </div>
                <div class="flex items-center space-x-4">
                    <a
                        href="./wishlist.html"
                        class="text-[#00e5ff] hover:bg-[#ffffff]/5 p-2 rounded-full transition-all"
                    >
                        <span class="material-symbols-outlined"
                            >shopping_cart</span
                        >
                    </a>
                    <a
                        href="./login.html"
                        class="text-[#00e5ff] hover:bg-[#ffffff]/5 p-2 rounded-full transition-all"
                    >
                        <span class="material-symbols-outlined"
                            >account_circle</span
                        >
                    </a>
                </div>
            </div>
        </nav>

        <main class="pt-20">
            <!-- Hero Section -->
            <section
                class="relative h-[500px] flex items-center justify-center overflow-hidden border-b border-outline-variant/10"
            >
                <div class="absolute inset-0 grid-pattern"></div>
                <div
                    class="absolute inset-0 bg-gradient-to-b from-transparent via-surface/50 to-surface"
                ></div>
                <div class="relative z-10 text-center px-6">
                    <h1
                        class="text-7xl md:text-9xl font-headline font-bold tracking-tighter text-on-surface uppercase mb-4"
                    >
                        The
                        <span
                            class="text-transparent bg-clip-text bg-gradient-to-r from-primary-fixed-dim to-primary"
                            >Notes</span
                        >
                    </h1>
                    <p
                        class="text-secondary font-label uppercase tracking-[0.4em] text-sm max-w-2xl mx-auto"
                    >
                        A Curated Selection of High-End Digital Artifacts
                    </p>
                </div>
            </section>

            <!-- Filters & Gallery Section -->
            <section class="max-w-screen-2xl mx-auto px-8 py-16">
                <div
                    class="flex flex-col md:flex-row md:items-center justify-between gap-8 mb-16"
                >
                    <div
                        class="flex flex-wrap items-center gap-3"
                        id="filter-buttons"
                    >
                        <button
                            class="px-6 py-2 rounded-full bg-secondary-container text-on-secondary-container font-label text-xs uppercase tracking-widest"
                        >
                            All Artifacts
                        </button>
                        <button
                            class="px-6 py-2 rounded-full bg-surface-container-high text-on-surface-variant font-label text-xs uppercase tracking-widest hover:bg-surface-container-highest transition-all"
                        >
                            Wearables
                        </button>
                    </div>
                    <div
                        class="flex items-center gap-4 text-on-surface-variant"
                    >
                        <span
                            class="text-xs font-label uppercase tracking-widest"
                            >Sort by:</span
                        >
                        <select
                            class="bg-transparent border-none text-primary font-label text-xs uppercase tracking-widest focus:ring-0 cursor-pointer"
                        >
                            <option>Newest First</option>
                            <option>Price High-Low</option>
                        </select>
                    </div>
                </div>

                <!-- Product Grid -->
                <!-- Bento Grid Products -->
                <section class="max-w-screen-2xl mx-auto px-8 pb-20">
                    <div
                        id="product-container"
                        class="grid grid-cols-1 md:grid-cols-3 gap-8"
                    ></div>
                    <script src="index.js"></script>
                </section>
                >
            </section>
        </main>

        <!-- Footer -->
        <footer
            class="bg-[#131313] w-full py-12 px-8 border-t border-[#3b494c]/15 mt-20"
        >
            <div
                class="flex flex-col md:flex-row justify-between items-center gap-6 w-full max-w-screen-2xl mx-auto"
            >
                <div
                    class="text-[#e2e2e2] font-bold font-['Space_Grotesk'] text-xl tracking-tighter uppercase"
                >
                    CYANIDE NOIR
                </div>
                <div
                    class="text-[#b0c9e8] font-['Manrope'] text-xs uppercase tracking-widest opacity-80"
                >
                    © 2024 CYANIDE NOIR. ENGINEERED FOR THE AVANT-GARDE.
                </div>
            </div>
        </footer>
        <script src="./js/index.js"></script>
    </body>
</html>
