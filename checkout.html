<!doctype html>
<html class="dark" lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>LUMINOUS NOIR | Checkout</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: { surface: "#0a0a0a", primary: "#00e5ff" },
                    },
                },
            };
        </script>
    </head>
    <body class="bg-surface text-white font-['Manrope'] min-h-screen">
        <main class="max-w-7xl mx-auto px-8 py-20">
            <div class="mb-12">
                <h1
                    class="text-4xl md:text-6xl font-bold tracking-tighter uppercase italic"
                >
                    Secure Checkout
                </h1>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                <div class="lg:col-span-7 space-y-12">
                    <section>
                        <h2
                            class="text-sm font-black uppercase tracking-[0.4em] mb-8 text-primary/50"
                        >
                            01. Shipping Details
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label
                                    class="text-[10px] uppercase tracking-widest text-gray-500"
                                    >Full Name</label
                                >
                                <input
                                    id="checkout-fullname"
                                    type="text"
                                    placeholder="Họ và tên"
                                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:border-primary outline-none"
                                />
                            </div>
                            <div class="space-y-2">
                                <label
                                    class="text-[10px] uppercase tracking-widest text-gray-500"
                                    >Email</label
                                >
                                <input
                                    id="checkout-email"
                                    type="email"
                                    placeholder="email@example.com"
                                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:border-primary outline-none"
                                />
                            </div>
                            <div class="md:col-span-2 space-y-2">
                                <label
                                    class="text-[10px] uppercase tracking-widest text-gray-500"
                                    >Phone</label
                                >
                                <input
                                    id="checkout-phone"
                                    type="tel"
                                    placeholder="Số điện thoại"
                                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:border-primary outline-none"
                                />
                            </div>
                            <div class="md:col-span-2 space-y-2">
                                <label
                                    class="text-[10px] uppercase tracking-widest text-gray-500"
                                    >Address</label
                                >
                                <textarea
                                    id="checkout-address"
                                    rows="3"
                                    placeholder="Địa chỉ giao hàng chi tiết"
                                    class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:border-primary outline-none"
                                ></textarea>
                            </div>
                        </div>
                    </section>
                </div>

                <aside class="lg:col-span-5">
                    <div
                        class="sticky top-12 bg-[#111] rounded-[2.5rem] p-8 border border-white/5 shadow-2xl"
                    >
                        <h2
                            class="text-lg font-bold mb-8 uppercase tracking-widest italic"
                        >
                            Order Summary
                        </h2>
                        <div
                            class="flex items-center gap-6 pb-8 border-b border-white/5"
                        >
                            <img
                                id="checkout-img"
                                src=""
                                class="w-24 h-32 object-cover rounded-xl border border-white/10"
                            />
                            <div class="flex-1">
                                <h3
                                    id="checkout-name"
                                    class="font-bold text-white uppercase tracking-tight leading-tight"
                                >
                                    Sản phẩm
                                </h3>
                                <p
                                    id="checkout-price"
                                    class="text-primary font-mono text-xl font-bold mt-2"
                                >
                                    $0.00
                                </p>
                            </div>
                        </div>
                        <div class="py-8 space-y-4">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500 uppercase"
                                    >Subtotal</span
                                >
                                <span
                                    id="subtotal-price"
                                    class="text-white font-mono"
                                    >$0.00</span
                                >
                            </div>
                            <div
                                class="flex justify-between items-end pt-4 border-t border-white/10"
                            >
                                <span
                                    class="text-xs font-black uppercase text-gray-400"
                                    >Total</span
                                >
                                <span
                                    id="final-price"
                                    class="text-4xl font-black text-white"
                                    >$0.00</span
                                >
                            </div>
                            <button
                                id="btn-complete-purchase"
                                class="w-full bg-primary text-black font-black py-5 rounded-2xl uppercase mt-8 hover:bg-white transition-all"
                            >
                                Complete Purchase
                            </button>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
        <script src="./js/checkout.js"></script>
    </body>
</html>
