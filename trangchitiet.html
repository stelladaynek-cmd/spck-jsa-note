<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <title>Luminous | Detail View</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            body {
                background: #050505;
                color: #fff;
                font-family: "Space Grotesk", sans-serif;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .detail-card {
                background: #0f0f0f;
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
        </style>
    </head>
    <body class="p-6">
        <div
            class="max-w-5xl w-full detail-card rounded-[3rem] overflow-hidden grid grid-cols-1 md:grid-cols-2"
        >
            <div class="p-10 bg-black flex items-center justify-center">
                <img
                    id="mainImg"
                    class="w-full rounded-2xl shadow-2xl"
                    src=""
                    alt=""
                />
            </div>
            <div class="p-12 flex flex-col justify-center">
                <h1
                    id="mainTitle"
                    class="text-5xl font-black uppercase italic mb-6"
                ></h1>
                <p
                    id="mainDesc"
                    class="text-gray-400 leading-relaxed mb-10 italic"
                ></p>
                <div
                    class="flex items-center justify-between border-t border-white/10 pt-8"
                >
                    <span
                        id="mainPrice"
                        class="text-3xl font-mono text-cyan-400 font-bold"
                    ></span>
                    <button
                        class="bg-white text-black px-8 py-4 rounded-full font-bold uppercase text-xs hover:bg-cyan-400 transition-all"
                    >
                        Add to System
                    </button>
                </div>
                <a
                    href="index.html"
                    class="mt-10 text-[10px] text-gray-600 uppercase hover:text-white transition-all"
                    >← Back to Terminal</a
                >
            </div>
        </div>
        <script src="detail.js"></script>
    </body>
</html>
