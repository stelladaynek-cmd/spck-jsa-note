<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Luminous | Detail View</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <style>
            body {
                background: #050505;
                color: #fff;
                font-family: "Space Grotesk", sans-serif;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .detail-card {
                background: #0f0f0f;
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
        </style>
    </head>
    <body class="p-6">
        <div
            class="max-w-5xl w-full detail-card rounded-[3rem] overflow-hidden grid grid-cols-1 md:grid-cols-2 shadow-2xl"
        >
            <div
                class="p-10 bg-black flex items-center justify-center border-r border-white/5"
            >
                <img
                    id="mainImg"
                    class="w-full rounded-2xl shadow-2xl object-cover aspect-square"
                    src=""
                    alt="Product"
                    onerror="
                        this.src = 'https://placehold.co/600x600?text=Artifact'
                    "
                />
            </div>

            <div class="p-12 flex flex-col justify-center">
                <h1
                    id="mainTitle"
                    class="text-5xl font-black uppercase italic mb-6 leading-none"
                >
                    Artifact Loading...
                </h1>
                <p
                    id="mainDesc"
                    class="text-gray-400 leading-relaxed mb-10 border-l-2 border-cyan-400/30 pl-4"
                >
                    Đang tải dữ liệu từ hệ thống...
                </p>

                <div class="flex flex-col gap-6 border-t border-white/10 pt-8">
                    <div id="action-buttons" class="flex flex-col gap-4">
                        <span
                            id="mainPrice"
                            class="text-4xl font-mono text-cyan-400 font-bold"
                        ></span>

                        <div
                            id="button-container"
                            class="flex flex-col sm:flex-row gap-3"
                        ></div>
                    </div>
                </div>

                <a
                    href="index.html"
                    class="mt-10 text-[10px] text-gray-600 uppercase hover:text-cyan-400 transition-all tracking-widest flex items-center gap-2"
                >
                    <span>←</span> Quay lại trang chủ
                </a>
            </div>
        </div>
        <script src="js/detail.js"></script>
    </body>
</html>
