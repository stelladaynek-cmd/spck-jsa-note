<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Product Detail - Dark Tech Style</title>
        <style>
            /* Giao diện tối đậm hiện đại */
            body {
                background-color: #0a0a0a;
                color: #ffffff;
                font-family: "Inter", sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
            }

            .detail-wrapper {
                display: grid;
                grid-template-columns: 1.2fr 1fr; /* Ảnh trái (rộng hơn tí), Thông tin phải */
                max-width: 1000px;
                width: 90%;
                gap: 40px;
                padding: 40px;
                background: #111111;
                border-radius: 24px;
                border: 1px solid #222;
            }

            /* Bên trái: Ảnh sản phẩm */
            .left-side img {
                width: 100%;
                height: auto;
                border-radius: 16px;
                background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
                object-fit: contain;
            }

            /* Bên phải: Thông tin */
            .right-side {
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .limited-tag {
                color: #888;
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 2px;
                margin-bottom: 10px;
            }

            #product-name {
                font-size: 42px;
                font-weight: 800;
                margin: 0 0 15px 0;
                text-transform: uppercase;
            }

            #product-price {
                font-size: 28px;
                color: #00e5ff; /* Màu xanh neon như hình bạn gửi */
                font-weight: 600;
                margin-bottom: 25px;
            }

            #product-desc {
                color: #aaa;
                line-height: 1.6;
                margin-bottom: 30px;
                font-size: 15px;
            }

            /* Nút bấm */
            .btn-action {
                width: 100%;
                padding: 16px;
                border-radius: 12px;
                font-weight: 700;
                cursor: pointer;
                border: none;
                margin-bottom: 12px;
                transition: 0.3s;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
            }

            .btn-add-cart {
                background-color: #00e5ff;
                color: #000;
            }

            .btn-wishlist {
                background-color: transparent;
                color: #fff;
                border: 1px solid #333;
            }

            .btn-action:hover {
                opacity: 0.8;
                transform: translateY(-2px);
            }

            /* Responsive cho Mobile */
            @media (max-width: 768px) {
                .detail-wrapper {
                    grid-template-columns: 1fr;
                    padding: 20px;
                }
            }
        </style>
    </head>
    <body>
        <div class="detail-wrapper">
            <div class="left-side">
                <img id="product-img" src="" alt="Sản phẩm" />
            </div>

            <div class="right-side">
                <div class="limited-tag">Limited Edition Release</div>
                <h1 id="product-name">Đang tải...</h1>
                <div id="product-price">0 VNĐ</div>

                <div id="product-desc">Mô tả sản phẩm sẽ hiện ở đây.</div>

                <button class="btn-action btn-add-cart">🛒 ADD TO CART</button>
                <button class="btn-action btn-wishlist">
                    ♡ ADD TO WISH-LIST
                </button>
            </div>
        </div>

        <script src="js/detail.js"></script>
    </body>
</html>
